# ==============================================================================
# MIGA Configuration for Wan2.1-1.3B
# Paper: "Enhancing Train-Free Infinite-Frame Generation for Consistent Long Videos"
# ==============================================================================

miga:
  # --- Two-Stage Training-Inference Alignment (TTA) ---
  sampling_steps: 54              # Total denoising steps T
  saw_width: 7                    # Lzig: zigzag width in Stage 1 (latents per noise level)

  # --- Generation Length ---
  long_iter_nums: 20              # Number of generated latent chunks
                                  # Total latent frames N = long_iter_nums * saw_width

  # --- Dual Consistency Enhancement (DCE) ---
  # Long-Range Frame Guidance
  temporal_memory_len: 4          # m_guid: number of long-range guidance frames

  # Self-Reflection
  involve_resample: true          # Whether to enable self-reflection correction
  resample_threshold: 0.01       # delta_adju: consistency score drop threshold
                                  # Smaller value -> more frequent correction -> better quality but slower

  # --- Output ---
  save_inter_results: true        # Whether to save intermediate results (for debugging)
